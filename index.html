<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ＡＩひらがな・カタカナマスター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Klee One (教科書体) と Zen Maru Gothic (丸ゴシック) を読み込む -->
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #fffbeb;
      --grid-line: #bae6fd;
      --btn-shadow: #0f172a20;
    }
    body {
      /* 基本のフォントを丸ゴシックに設定 */
      font-family: 'Zen Maru Gothic', "Hiragino Maru Gothic ProN", "HGMaruGothicMPRO", sans-serif; 
      font-weight: 700;
      background-color: var(--bg-color);
      color: #334155;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      touch-action: none;
      opacity: 0; 
      transition: opacity 0.5s ease-in-out;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    }
    input { -webkit-user-select: auto; user-select: auto; }
    
    /* 練習する文字用の教科書体クラス */
    .kyokasho { font-family: 'Klee One', "UD デジタル 教科書体 N-R", "UD Digi Kyokasho N-R", serif !important; }
    
    .kanji-grid {
      position: relative; background-color: #ffffff;
      border: 4px solid #cbd5e1; border-radius: 1.5rem;
      box-shadow: 0 8px 20px var(--btn-shadow); overflow: hidden;
      width: 100%; height: 100%; max-width: 100%; max-height: 100%;
    }
    .grid-line-v { position: absolute; top: 0; left: 50%; width: 0; height: 100%; border-left: 2px dashed var(--grid-line); pointer-events: none; z-index: 1; }
    .grid-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 0; border-top: 2px dashed var(--grid-line); pointer-events: none; z-index: 1; }
    
    .btn-action { transition: all 0.1s ease; border-bottom-width: 4px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
    @media (min-width: 768px) { .btn-action { border-bottom-width: 6px; min-height: 56px; } }
    .btn-action:active { transform: translateY(4px); border-bottom-width: 2px; }
    
    #speedSlider { -webkit-appearance: none; width: 100%; height: 16px; border-radius: 8px; background: #e2e8f0; outline: none; transition: background 0.1s; }
    #speedSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 34px; height: 34px; background: #ffffff; border-radius: 50%; cursor: pointer; border: 4px solid #38bdf8; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    
    .locked { opacity: 0.5; filter: grayscale(0.8); pointer-events: none; transition: all 0.3s; }
    .scroll-hide::-webkit-scrollbar { display: none; }
    
    .bg-stroke-path { stroke: #f1f5f9; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .stroke-path { stroke: #000000; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    #confettiCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

    /* 50音表用のスタイル */
    .kana-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 600; border-radius: 0.5rem; border: 2px solid var(--grid-line);
      cursor: pointer; transition: all 0.15s; background-color: #ffffff; color: #334155;
      box-shadow: 0 2px 4px var(--btn-shadow); position: relative;
    }
    @media (min-width: 768px) { .kana-cell { font-size: 2.2rem; border-radius: 0.75rem; border-width: 3px; } }
    .kana-cell:active { transform: scale(0.9); }
    .kana-cell.empty { border-color: transparent; background-color: transparent; box-shadow: none; pointer-events: none; }
    .kana-cell.mastered { background-color: #fef3c7; border-color: #f59e0b; color: #b45309; }
    .kana-cell.mastered::after {
      content: '💮'; position: absolute; top: -5px; right: -5px; font-size: 0.8rem;
    }
    .kana-cell.current { background-color: #38bdf8; border-color: #0284c7; color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(56,189,248,0.5); z-index: 10; }
    
    .info-stroke-path { stroke: #334155; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  </style>
</head>
<body id="appBody" class="p-1 md:p-2 box-border">
  <canvas id="confettiCanvas"></canvas>

  <div id="excellentPopup" class="fixed inset-0 pointer-events-none z-[200] flex items-center justify-center opacity-0 scale-50 transition-all duration-500">
    <div class="bg-white/95 backdrop-blur-sm px-8 py-6 rounded-3xl shadow-2xl border-4 border-emerald-400 transform -rotate-2">
      <span class="text-4xl md:text-7xl font-black text-emerald-500 drop-shadow-sm tracking-widest leading-none">💮よくできました</span>
    </div>
  </div>

  <!-- リセット確認用カスタムモーダル -->
  <div id="resetConfirmModal" class="fixed inset-0 z-[300] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
    <div id="resetModalContent" class="bg-white rounded-2xl md:rounded-3xl shadow-2xl border-4 border-rose-300 p-6 md:p-8 flex flex-col items-center gap-4 relative z-10 transform scale-95 transition-transform duration-300 max-w-sm w-full mx-4">
      <div class="text-rose-500 text-5xl md:text-6xl mb-1">⚠️</div>
      <p class="text-base md:text-xl font-black text-slate-700 text-center leading-relaxed">
        いままで れんしゅうした<br>データを ぜんぶ けしますか？
      </p>
      <div class="flex gap-3 mt-4 w-full">
        <button onclick="closeResetModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold text-sm md:text-base border-b-4 border-slate-300 active:translate-y-1 active:border-b-0 transition-all hover:bg-slate-200">やめる</button>
        <button onclick="executeResetData()" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold text-sm md:text-base border-b-4 border-rose-700 active:translate-y-1 active:border-b-0 transition-all shadow-md hover:bg-rose-600">けす</button>
      </div>
    </div>
  </div>

  <header class="h-12 md:h-16 shrink-0 flex items-center justify-between bg-white px-2 md:px-4 rounded-xl shadow-sm border-b-2 md:border-b-4 border-slate-200 mb-1 md:mb-2 z-10 relative">
    <div class="flex-1 hidden sm:block"></div>
    <h1 class="text-sm sm:text-lg md:text-2xl font-black text-indigo-600 tracking-tighter shrink-0 drop-shadow-sm text-center">ひらがな・カタカナかきかたマスター</h1>
    
    <div class="flex-1 flex items-center justify-end gap-1 md:gap-2">
      <div class="flex items-center gap-1 bg-slate-100 p-1 md:p-1.5 rounded-full border-2 border-transparent focus-within:border-indigo-300 transition-all shadow-inner">
        <input type="text" id="searchInput" maxlength="1" placeholder="かんじをさがす" class="w-20 md:w-28 text-xs md:text-base bg-transparent text-center font-black text-indigo-600 focus:outline-none placeholder:text-slate-400">
        <button id="searchBtn" class="bg-indigo-500 text-white w-6 h-6 md:w-8 md:h-8 rounded-full flex items-center justify-center hover:bg-indigo-600 active:scale-90 transition-all shadow-md">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 md:h-4 md:w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>
      </div>
      <div class="bg-amber-100 text-amber-600 px-2 py-1 md:px-3 md:py-1.5 rounded-full font-black text-xs md:text-sm shadow-inner shrink-0 hidden md:block">
        🏆 <span id="masterTotalCount">0</span>
      </div>
    </div>
  </header>

  <main class="flex-1 flex flex-col md:flex-row gap-1 md:gap-3 min-h-0 overflow-hidden z-10 relative">
    
    <!-- 左側セクション：モード選択＆50音表 または 漢字情報 または アニメーション -->
    <section class="flex-1 bg-white rounded-2xl md:rounded-3xl shadow-lg border-2 md:border-4 border-sky-100 flex flex-col overflow-hidden relative p-1.5 md:p-3">
      
      <!-- かなモード（50音表） -->
      <div id="kanaContainer" class="absolute inset-0 flex flex-col p-1.5 md:p-3 bg-white z-10 transition-opacity duration-300">
        <div class="flex justify-center gap-1 md:gap-2 mb-1 md:mb-2 shrink-0">
          <button id="modeHiraganaBtn" onclick="changeKanaMode('hiragana')" class="flex-1 py-1.5 md:py-2 rounded-lg md:rounded-xl font-black text-sm md:text-lg shadow-sm border-2 border-sky-200 bg-sky-50 text-sky-600 transition-all hover:bg-sky-100">ひらがな</button>
          <button id="modeKatakanaBtn" onclick="changeKanaMode('katakana')" class="flex-1 py-1.5 md:py-2 rounded-lg md:rounded-xl font-black text-sm md:text-lg shadow-sm border-2 border-slate-200 bg-white text-slate-400 transition-all hover:bg-slate-50">カタカナ</button>
        </div>
        
        <div class="flex-1 overflow-y-auto bg-slate-50 rounded-lg md:rounded-xl p-1.5 md:p-3 border-2 border-slate-200 scroll-hide relative">
          <div id="gojuonGrid" class="grid grid-cols-5 gap-1 md:gap-2 max-w-sm mx-auto">
            <!-- JSでセルを生成 -->
          </div>
        </div>

        <div class="flex gap-1 md:gap-2 shrink-0 mt-1 md:mt-2">
          <button id="btnSequenceMode" onclick="startSequenceMode()" class="flex-1 py-1.5 md:py-2 rounded-lg md:rounded-xl text-xs md:text-base font-black shadow-md border-b-4 border-emerald-600 bg-emerald-400 text-white btn-action hover:bg-emerald-500 transition-all duration-300">
            あいうえお<br class="md:hidden">じゅん
          </button>
          <button id="btnRandomMode" onclick="startRandomMode()" class="flex-1 py-1.5 md:py-2 rounded-lg md:rounded-xl text-xs md:text-base font-black shadow-md border-b-4 border-purple-600 bg-purple-400 text-white btn-action hover:bg-purple-500 transition-all duration-300">
            ばらばら
          </button>
        </div>
      </div>

      <!-- 漢字モード（検索時） -->
      <div id="kanjiContainer" class="hidden absolute inset-0 flex flex-col p-1.5 md:p-3 bg-white z-10 transition-opacity duration-300">
        <div class="flex justify-between items-center mb-1 md:mb-2 shrink-0 h-8 md:h-10">
          <span class="text-[10px] md:text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 md:px-3 md:py-1 rounded-full shadow-sm flex items-center">かんじ モード</span>
          <button onclick="changeKanaMode('hiragana')" class="bg-white text-sky-500 px-2 py-0.5 md:px-3 md:py-1 rounded-full font-bold text-[10px] md:text-xs border-2 border-sky-100 hover:text-sky-600 shadow-sm flex items-center">かな にもどる</button>
        </div>
        <div class="flex-1 flex items-center justify-center min-h-0 w-full py-0.5 md:py-1">
          <div class="h-full aspect-square max-h-[420px]">
            <div class="kanji-grid border-slate-300 bg-white">
              <div class="grid-line-v"></div><div class="grid-line-h"></div>
              <svg id="infoKanjiSvg" viewBox="0 0 109 109" class="w-full h-full absolute inset-0 z-10"></svg>
            </div>
          </div>
        </div>
        <!-- 右側と高さを合わせるための見えないスペーサー -->
        <div class="mt-1 md:mt-2 flex gap-1 md:gap-2 shrink-0 opacity-0 pointer-events-none select-none">
          <div class="flex-1 py-1 md:py-2 border-b-4 md:border-b-6 btn-action">スペーサー</div>
        </div>
      </div>

      <!-- アニメーションフレーム -->
      <div id="animeFrame" class="hidden absolute inset-0 flex flex-col bg-sky-50 z-20 p-1.5 md:p-3">
        <div class="flex justify-between items-center mb-1 md:mb-2 shrink-0">
          <span class="text-[10px] md:text-xs font-bold text-sky-500 bg-white px-2 py-0.5 md:px-3 md:py-1 rounded-full shadow-sm">かきじゅん</span>
          <button onclick="closeAnime()" class="bg-white text-slate-500 px-2 py-0.5 md:px-3 md:py-1 rounded-full font-bold text-[10px] md:text-xs border-2 border-slate-200 hover:text-rose-500 shadow-sm">✕ もどる</button>
        </div>
        <div class="flex-1 flex items-center justify-center min-h-0 w-full py-0.5 md:py-1">
          <div class="h-full aspect-square max-h-[420px]">
            <div class="kanji-grid border-sky-300 bg-white">
              <div class="grid-line-v"></div><div class="grid-line-h"></div>
              <svg id="animeSvg" viewBox="0 0 109 109" class="w-full h-full relative z-10">
                <g id="animeBgGroup"></g>
                <g id="strokeGroup"></g>
                <g id="numberGroup"></g>
              </svg>
            </div>
          </div>
        </div>
        <div class="mt-1 md:mt-2 flex gap-1 md:gap-2 shrink-0">
          <button onclick="playAnime()" class="shrink-0 px-6 md:px-10 bg-sky-400 text-white py-1.5 md:py-3 rounded-lg md:rounded-xl font-bold text-lg md:text-3xl shadow-lg border-b-4 md:border-b-6 border-sky-600 btn-action hover:bg-sky-500">▶</button>
          <div class="flex-1 bg-white px-3 md:px-4 py-1 md:py-2 rounded-lg md:rounded-xl shadow-sm border-2 border-sky-100 flex flex-col justify-center">
            <input type="range" id="speedSlider" min="1" max="10" value="5" class="w-full">
            <div class="flex justify-between text-[10px] md:text-sm text-sky-400 font-bold mt-1 px-1">
              <span>🐢 ゆっくり</span>
              <span>はやい 🐇</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 右側セクション：練習エリア -->
    <section id="writeSection" class="flex-1 bg-white rounded-2xl md:rounded-3xl shadow-lg border-2 md:border-4 border-orange-100 flex flex-col p-1.5 md:p-3 relative overflow-hidden">
      <div class="flex justify-center items-center mb-1 md:mb-2 shrink-0 h-8 md:h-10">
        <span id="nazorigakiTitle" class="text-sm md:text-lg font-black text-orange-600 bg-orange-100 px-4 py-1 md:px-6 md:py-1.5 rounded-lg md:rounded-xl shadow-sm border-2 border-orange-300">もじを えらんでね👆</span>
      </div>
      
      <div id="writeArea" class="flex-1 flex items-center justify-center min-h-0 relative locked w-full py-0.5 md:py-1">
        <div class="h-full aspect-square max-h-[420px]">
          <div id="writeGrid" class="kanji-grid border-orange-300">
            <div class="grid-line-v"></div><div class="grid-line-h"></div>
            <canvas id="guideCanvas" class="absolute inset-0 z-0 w-full h-full"></canvas>
            <canvas id="inkCanvas" class="absolute inset-0 z-10 w-full h-full"></canvas>
            <canvas id="writeCanvas" class="absolute inset-0 z-20 touch-none w-full h-full cursor-crosshair"></canvas>
          </div>
        </div>
      </div>
      
      <div class="mt-1 md:mt-2 flex gap-1 md:gap-2 shrink-0">
        <button id="clearBtn" onclick="restartPractice()" class="flex-1 bg-orange-50 text-orange-500 py-1 md:py-2 rounded-lg md:rounded-xl font-bold border-b-4 md:border-b-6 border-orange-200 btn-action locked flex flex-col leading-tight">
          <span id="clearBtnText" class="text-xs md:text-base">やりなおし</span>
        </button>
        
        <!-- 練習中に出る書き順ボタン -->
        <button id="showAnimeBtnRight" onclick="showAnime()" class="hidden flex-1 bg-sky-100 text-sky-600 py-1 md:py-2 rounded-lg md:rounded-xl font-bold border-b-4 md:border-b-6 border-sky-300 btn-action flex flex-col leading-tight">
          <span class="text-[10px] md:text-sm">👀 かきじゅん</span>
        </button>

        <!-- クリア後に出る次へボタン -->
        <button id="nextBtnRight" onclick="goNextChar()" class="hidden flex-[2] bg-orange-400 text-white py-1.5 md:py-3 rounded-lg md:rounded-xl text-sm md:text-xl font-black shadow-lg border-b-4 md:border-b-6 border-orange-600 btn-action hover:bg-orange-500">
          つぎの もじ ➡
        </button>
      </div>
    </section>
  </main>

  <footer class="h-14 md:h-32 shrink-0 bg-white border-t-2 md:border-t-4 border-slate-100 flex flex-col px-2 md:px-3 py-0.5 md:py-1 z-10 relative">
    <div class="flex-1 flex items-center gap-1.5 md:gap-3 min-h-0">
      <div class="flex flex-col items-center shrink-0 w-20 md:w-28">
        <div id="masteredTitle" class="bg-amber-100 text-amber-600 border-b-2 md:border-b-4 border-amber-300 rounded-lg md:rounded-xl px-1.5 py-0.5 md:px-2 md:py-1 font-black text-[9px] md:text-xs text-center shadow-sm leading-tight w-full">
          かけるように<br>なったもじ
        </div>
      </div>
      <div id="masteredList" class="flex-1 flex flex-row md:flex-wrap gap-1 overflow-x-auto md:overflow-x-hidden overflow-y-hidden md:overflow-y-auto h-full content-center md:content-start items-center md:items-start py-0.5 md:py-1 scroll-hide"></div>
      <div class="shrink-0 flex flex-col items-end gap-1">
        <button onclick="resetData()" class="bg-slate-100 text-slate-500 hover:bg-rose-100 hover:text-rose-500 text-[10px] md:text-xs px-2 py-1 md:px-3 md:py-1.5 rounded-lg font-bold transition-colors shadow-sm border border-slate-200">↻ データをけす</button>
        <span class="md:hidden text-[10px] text-amber-500 font-bold">🏆 <span id="masterTotalCountMobile">0</span></span>
      </div>
    </div>
    <div class="text-center text-[8px] md:text-[9px] text-slate-300 font-bold py-0 md:py-0.5 select-none pointer-events-none">
      ©2026　ひらがな・カタカナかきかたマスター　ＩＣＴ支援の杜
    </div>
  </footer>

  <script>
    const KANJI_DATA_RAW = `学年漢字音読み訓読み1年生一イチ、イッひと（つ）1年生右-みぎ1年生雨-あめ1年生円エン-1年生王オウ-1年生音-おと1年生下-した1年生火カひ1年生花-はな1年生貝-かい1年生学ガク、ガッ-1年生気キ-1年生九キュウ、クここの（つ）1年生休-やす（む）1年生玉-たま1年生金キンかね1年生空-そら1年生月ゲツ、ガツつき1年生犬-いぬ1年生見-み（る）1年生五ゴいつ（つ）1年生口-くち1年生校コウ-1年生左-ひだり1年生三サンみ、みっ（つ）1年生山-やま1年生子-こ1年生四シよ、よっ（つ）、よん1年生糸-いと1年生字ジ-1年生耳-みみ1年生七シチなな、なな（つ）1年生車-くるま1年生手-て1年生十ジュウとお1年生出-で（る）、だ（す）1年生女-おんな1年生小-ちい（さい）、こ、お1年生上-うえ、あ（がる）、あ（げる）1年生森-もり1年生人ジン、ニンひと1年生水スイみず1年生正-ただ（しい）1年生生-い（きる）、う（まれる）1年生青-あお、あお（い）1年生夕-ゆう1年生石-いし1年生赤-あか、あか（い）1年生千センち1年生川-かわ1年生先-さき1年生早-はや（い）1年生草-くさ1年生足-あし、た（す）1年生村-むら1年生大ダイ、タイおお（きい）1年生男-おとこ1年生竹-たけ1年生中チュウなか1年生虫-むし1年生町-まち1年生天テン-1年生田-た1年生土-つち1年生二ニふた（つ）1年生日ニチひ、か1年生入-はい（る）、い（れる）1年生年ネンとし1年生白-しろ、しろ（い）1年生八ハチやっ（つ）1年生百ヒャク-1年生文ブン-1年生木-き1年生本ホン-1年生名-な1年生目-め1年生立-た（つ）1年生力-ちから1年生林-はやし1年生六ロクむっ（つ）、むい`;

    // 50音表データ
    const HIRA_TABLE = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','','ゆ','','よ','ら','り','る','れ','ろ','わ','','','','を','ん','','','',''];
    const KATA_TABLE = ['ア','イ','ウ','エ','オ','カ','キ','ク','ケ','コ','サ','シ','ス','セ','ソ','タ','チ','ツ','テ','ト','ナ','ニ','ヌ','ネ','ノ','ハ','ヒ','フ','ヘ','ホ','マ','ミ','ム','メ','モ','ヤ','','ユ','','ヨ','ラ','リ','ル','レ','ロ','ワ','','','','ヲ','ン','','','',''];
    const HIRA_LIST = HIRA_TABLE.filter(c => c !== '');
    const KATA_LIST = KATA_TABLE.filter(c => c !== '');

    let kanjiList = []; let kanjiStore = {}; 
    let appState = { 
      mode: 'hiragana', // 'hiragana', 'katakana', 'kanji'
      playMode: 'free', // 'free', 'sequential', 'random'
      currentKanji: null, 
      mastered: [], 
      currentStroke: 0, 
      isPracticing: false, 
      animeIsRunning: false, 
      hasMistaken: false,
      hasSeenAnime: false
    };
    const kanjiPathsCache = {};
    let writeCanvas, inkCanvas, guideCanvas, ctxW, ctxInk, ctxGuide, audioCtx;

    function el(id) { return document.getElementById(id); }

    // 音声・演出系
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, duration, vol = 0.1) {
      if(!audioCtx) return;
      try { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime); g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + duration); } catch(e) {}
    }

            }, 1500);
          }

        } else { playPingPong(); }
      } else { ctxW.clearRect(0,0,writeCanvas.width, writeCanvas.height); handleMistake(); }
    }

    function redrawInk() {
      const size = inkCanvas.width; ctxInk.clearRect(0,0,size,size); if (appState.currentStroke === 0) return;
      ctxInk.save(); ctxInk.scale(size/109, size/109); ctxInk.strokeStyle = "#000000"; ctxInk.lineWidth = 6; ctxInk.lineCap = 'round'; ctxInk.lineJoin = 'round';
      const strokes = appState.currentKanji.paths; for(let i=0; i<appState.currentStroke; i++) ctxInk.stroke(new Path2D(strokes[i]));
      ctxInk.restore();
    }

    function setupEvents() {
      el('searchBtn').onclick = searchKanji; el('searchInput').onkeypress = (e) => { if (e.key === 'Enter') searchKanji(); };
      const pd = (e) => { e.preventDefault(); }; window.addEventListener('contextmenu', pd);
      writeCanvas.addEventListener('mousedown', startDraw); writeCanvas.addEventListener('mousemove', draw); writeCanvas.addEventListener('mouseup', endDraw); writeCanvas.addEventListener('mouseleave', endDraw);
      writeCanvas.addEventListener('touchstart', (e) => { pd(e); startDraw(e); }, {passive: false}); writeCanvas.addEventListener('touchmove', (e) => { pd(e); draw(e); }, {passive: false}); writeCanvas.addEventListener('touchend', endDraw, {passive: false});
    }

    function renderMasteredList() {
      const container = el('masteredList'); container.innerHTML = '';
      const titleEl = el('masteredTitle');
      
      let masteredInMode = []; 
      let titleStr = "";
      
      if (appState.mode === 'hiragana') { 
        masteredInMode = appState.mastered.filter(c => HIRA_LIST.includes(c)).reverse();
        titleStr = "かけるように<br>なったひらがな"; 
      }
      else if (appState.mode === 'katakana') { 
        masteredInMode = appState.mastered.filter(c => KATA_LIST.includes(c)).reverse();
        titleStr = "かけるように<br>なったカタカナ"; 
      }
      else { 
        masteredInMode = appState.mastered.filter(c => !HIRA_LIST.includes(c) && !KATA_LIST.includes(c)).reverse();
        titleStr = "かけるように<br>なったかんじ"; 
      }
      
      titleEl.innerHTML = titleStr;

      masteredInMode.forEach(c => {
        const d = document.createElement('div'); d.className = 'w-6 h-6 md:w-9 md:h-9 bg-white border-2 border-amber-300 rounded-full flex items-center justify-center kyokasho text-[10px] md:text-base font-black text-amber-700 shadow-sm shrink-0'; d.innerText = c; container.appendChild(d);
      });
      el('masterTotalCount').textContent = appState.mastered.length; el('masterTotalCountMobile').textContent = appState.mastered.length;
    }

    function showExcellentPopup() { el('excellentPopup').classList.remove('opacity-0', 'scale-50'); el('excellentPopup').classList.add('opacity-100', 'scale-100'); }
    function hideExcellentPopup() { el('excellentPopup').classList.remove('opacity-100', 'scale-100'); el('excellentPopup').classList.add('opacity-0', 'scale-50'); }

    // CSSトランジションを使った確実なアニメーション方式に変更
    function flyToCollection(char) {
      const sourceGrid = el('writeGrid'); if (!sourceGrid) { renderMasteredList(); return; }
      const sourceRect = sourceGrid.getBoundingClientRect(); 
      const targetList = el('masteredList'); if (!targetList) { renderMasteredList(); return; }
      const targetRect = targetList.getBoundingClientRect(); 
      
      const flier = document.createElement('div');
      // z-[9999]で確実にすべての要素より手前に表示
      flier.className = 'fixed z-[9999] kyokasho text-amber-500 bg-white border-4 border-amber-300 rounded-full flex items-center justify-center shadow-2xl font-black pointer-events-none';
      flier.style.width = sourceRect.width + 'px'; 
      flier.style.height = sourceRect.height + 'px'; 
      flier.style.left = sourceRect.left + 'px'; 
      flier.style.top = sourceRect.top + 'px'; 
      flier.style.fontSize = (sourceRect.height * 0.7) + 'px'; 
      flier.style.lineHeight = '1'; 
      flier.innerText = char; 
      
      // CSSによる滑らかなアニメーション設定
      flier.style.transition = 'all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
      flier.style.transformOrigin = 'center center';
      
      document.body.appendChild(flier);

      // コレクションエリアの先頭付近をターゲットにする
      const targetCenterX = targetRect.left + 26; 
      const targetCenterY = targetRect.top + 26;
      const sourceCenterX = sourceRect.left + sourceRect.width / 2; 
      const sourceCenterY = sourceRect.top + sourceRect.height / 2;
      
      const translateX = targetCenterX - sourceCenterX; 
      const translateY = targetCenterY - sourceCenterY;
      const targetScale = 36 / sourceRect.width;

      // ブラウザにDOMを認識させたあとに変化を与える
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          flier.style.transform = `translate(${translateX}px, ${translateY}px) scale(${targetScale}) rotate(360deg)`;
          flier.style.opacity = '0';
        });
      });

      // アニメーション完了後の処理
      setTimeout(() => { 
        playTone(880, 'sine', 0.1); 
        setTimeout(() => playTone(1108.73, 'sine', 0.15), 80); 
        if (flier.parentNode) flier.remove(); 
        renderMasteredList(); 
      }, 1200);
    }

    function resetData() { 
      const modal = el('resetConfirmModal');
      const content = el('resetModalContent');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      content.classList.remove('scale-95');
      content.classList.add('scale-100');
    }

    function closeResetModal() {
      const modal = el('resetConfirmModal');
      const content = el('resetModalContent');
      modal.classList.add('opacity-0', 'pointer-events-none');
      content.classList.remove('scale-100');
      content.classList.add('scale-95');
    }

    function executeResetData() {
      localStorage.clear();
      location.reload();
    }

    window.onload = () => { init(); setTimeout(() => { document.body.style.opacity = '1'; }, 100); };
  </script>
</body>
